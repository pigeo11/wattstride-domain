<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Waitlist | WattStride</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --accent-color: #00ff88; /* Electric Green */
            --secondary-text: #a0a0a0;
            --card-bg: #111111;
            --input-bg: #1a1a1a;
            --input-border: #333333;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--accent-color);
            text-decoration: none;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            margin-left: 2rem;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--accent-color);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.125rem;
            color: var(--secondary-text);
            margin-bottom: 3rem;
        }

        .waitlist-form {
            width: 100%;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid var(--input-border);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--secondary-text);
        }

        input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--accent-color);
            background: #222;
        }

        .btn-submit {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 1.25rem;
            border-radius: 12px;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }

        footer {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--secondary-text);
            font-size: 0.875rem;
        }

        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vw;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.03) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: -1;
        }

        @media (max-width: 600px) {
            .waitlist-form { padding: 2rem; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <header>
        <a href="index.html" class="logo">WattStride</a>
        <nav>
            <a href="index.html">Back Home</a>
        </nav>
    </header>
    <main>
        <h1>Secure Your Spot.</h1>
        <p>Be among the first to turn your charging time into a competitive advantage. Early access members get exclusive badges and early league entry.</p>
        
        <form class="waitlist-form" id="waitlistForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label for="ev">EV Model (Optional)</label>
                <input type="text" id="ev" name="ev" placeholder="Tesla Model 3, Rivian R1S, etc.">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Join the Stride</button>
        </form>

        <script>
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwdKUHE-Wf4A8o0SmAX87Ibp0U88z0v944VSeIR2OfyHcqfM5l-tqAVdq-MMcfYUulH/exec';
            const form = document.getElementById('waitlistForm');
            const btn = document.getElementById('submitBtn');

            form.addEventListener('submit', e => {
                e.preventDefault();
                btn.disabled = true;
                btn.innerText = 'Joining...';

                const data = {
                    name: form.name.value,
                    email: form.email.value,
                    ev: form.ev.value
                };

                fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', // Apps Script requires no-cors for simple deployments
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                })
                .then(() => {
                    alert('Welcome to the Stride! You have been added to the waitlist.');
                    form.reset();
                    window.location.href = 'index.html';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert('Something went wrong. Please try again.');
                    btn.disabled = false;
                    btn.innerText = 'Join the Stride';
                });
            });
        </script>
    </main>
    <footer>
        &copy; 2026 WattStride. All rights reserved.
    </footer>
</body>
</html>
